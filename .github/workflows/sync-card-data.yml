name: Sync Card Data

on:
  workflow_dispatch:
    inputs:
      sync_mode:
        description: Collector mode to run
        required: false
        default: full
        type: choice
        options:
          - full
          - keepalive
  schedule:
    - cron: "45 2 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: sync-card-data
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      runner_ready: ${{ steps.runners.outputs.runner_ready }}
      matching_count: ${{ steps.runners.outputs.matching_count }}
      online_count: ${{ steps.runners.outputs.online_count }}
    steps:
      - name: Resolve sync mode
        id: mode
        shell: bash
        run: |
          mode="full"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.sync_mode }}" ]]; then
            mode="${{ inputs.sync_mode }}"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Collector mode: $mode"

      - name: Check self-hosted runner availability
        id: runners
        uses: actions/github-script@v7
        with:
          script: |
            const requiredLabels = ['self-hosted', 'windows', 'x64'];
            const runners = await github.paginate(
              github.rest.actions.listSelfHostedRunnersForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );

            const matching = runners.filter((runner) => {
              const labelSet = new Set((runner.labels || []).map((label) => String(label.name || '').toLowerCase()));
              return requiredLabels.every((label) => labelSet.has(label));
            });
            const online = matching.filter((runner) => String(runner.status || '').toLowerCase() === 'online');

            core.setOutput('matching_count', String(matching.length));
            core.setOutput('online_count', String(online.length));
            core.setOutput('runner_ready', online.length > 0 ? 'true' : 'false');

            const summaryLines = [
              `Required labels: ${requiredLabels.join(', ')}`,
              `Matching self-hosted runners: ${matching.length}`,
              `Online matching runners: ${online.length}`,
            ];

            if (matching.length > 0) {
              summaryLines.push('');
              summaryLines.push('Matching runners:');
              for (const runner of matching) {
                summaryLines.push(`- ${runner.name} (${runner.status}${runner.busy ? ', busy' : ''})`);
              }
            }

            core.summary
              .addHeading('Card data sync preflight')
              .addRaw(summaryLines.join('\n'), true)
              .addBreak();

            if (online.length === 0) {
              core.summary
                .addQuote('No online self-hosted runner with labels self-hosted, windows, x64 is currently available. Start the runner on the collector machine first, then re-run this workflow.')
                .addBreak();
              core.warning('No online self-hosted runner with labels self-hosted, windows, x64 is currently available.');
            } else {
              core.summary
                .addRaw('Runner preflight passed. The sync job can continue.', true)
                .addBreak();
            }

            await core.summary.write();

      - name: Fail fast when no runner is online
        if: steps.runners.outputs.runner_ready != 'true'
        shell: bash
        run: |
          echo "No online self-hosted runner with labels self-hosted, windows, x64 is available."
          echo "Open the collector machine, make sure the GitHub Actions runner service is online, and trigger the workflow again."
          exit 1

  sync:
    needs: preflight
    if: needs.preflight.outputs.runner_ready == 'true'
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 45
    env:
      XHH_CDP_URL: ${{ vars.XHH_CDP_URL }}
      XHH_CHROME_USER_DATA_DIR: ${{ vars.XHH_CHROME_USER_DATA_DIR }}
      XHH_ALERT_WEBHOOK: ${{ secrets.XHH_ALERT_WEBHOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: collector/package-lock.json

      - name: Install collector dependencies
        shell: powershell
        working-directory: collector
        run: npm ci

      - name: Ensure browser CDP endpoint
        id: cdp
        shell: powershell
        run: |
          $cdpUrl = if ([string]::IsNullOrWhiteSpace($env:XHH_CDP_URL)) { "http://127.0.0.1:9222" } else { $env:XHH_CDP_URL.Trim() }
          $userDataDir = if ([string]::IsNullOrWhiteSpace($env:XHH_CHROME_USER_DATA_DIR)) { "C:\xhh-collector-profile" } else { $env:XHH_CHROME_USER_DATA_DIR.Trim() }
          $probeUrl = "$cdpUrl/json/version"
          $remoteDebuggingPort = 9222

          try {
            $remoteDebuggingPort = ([uri]$cdpUrl).Port
          }
          catch {
          }

          $ready = $false
          try {
            Invoke-WebRequest -Uri $probeUrl -UseBasicParsing -TimeoutSec 5 | Out-Null
            $ready = $true
            Write-Host "Reusing existing Chrome/Edge CDP endpoint: $cdpUrl"
          }
          catch {
            Write-Host "CDP endpoint not ready. Launching collector browser profile..."
            .\collector\tools\start-xhh-chrome.ps1 -UserDataDir $userDataDir -RemoteDebuggingPort $remoteDebuggingPort
          }

          if (-not $ready) {
            for ($attempt = 1; $attempt -le 24; $attempt++) {
              try {
                Invoke-WebRequest -Uri $probeUrl -UseBasicParsing -TimeoutSec 5 | Out-Null
                $ready = $true
                break
              }
              catch {
                Start-Sleep -Seconds 5
              }
            }
          }

          if (-not $ready) {
            throw "Timed out waiting for Chrome/Edge CDP endpoint at $cdpUrl. Log into the data source site in the collector browser profile first."
          }

          $usingDefaultCdp = if ([string]::IsNullOrWhiteSpace($env:XHH_CDP_URL)) { "true" } else { "false" }
          $usingDefaultUserDataDir = if ([string]::IsNullOrWhiteSpace($env:XHH_CHROME_USER_DATA_DIR)) { "true" } else { "false" }

          "cdp_url=$cdpUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "chrome_user_data_dir=$userDataDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "using_default_cdp=$usingDefaultCdp" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "using_default_user_data_dir=$usingDefaultUserDataDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Add collector runtime config to summary
        if: always()
        shell: powershell
        run: |
          @(
            "## Collector runtime config",
            "",
            "| Key | Value |",
            "| --- | --- |",
            "| Resolved XHH_CDP_URL | `${{ steps.cdp.outputs.cdp_url }}` |",
            "| Using default XHH_CDP_URL | `${{ steps.cdp.outputs.using_default_cdp }}` |",
            "| Resolved XHH_CHROME_USER_DATA_DIR | `${{ steps.cdp.outputs.chrome_user_data_dir }}` |",
            "| Using default XHH_CHROME_USER_DATA_DIR | `${{ steps.cdp.outputs.using_default_user_data_dir }}` |"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Run collector
        shell: powershell
        working-directory: collector
        run: |
          $mode = "${{ needs.preflight.outputs.mode }}"
          $collectorArgs = @("tools/xhh-sts2-sync.mjs")

          if ($mode -eq "keepalive") {
            $collectorArgs += "--keepalive-only"
          }

          $collectorArgs += @("--output", "output/xhh/cards.snapshot.json")

          if (-not [string]::IsNullOrWhiteSpace($env:XHH_ALERT_WEBHOOK)) {
            $collectorArgs += @("--alert-webhook", $env:XHH_ALERT_WEBHOOK.Trim())
          }

          node @collectorArgs

      - name: Print collector manifest
        if: always()
        shell: powershell
        run: |
          $manifestPath = "collector\output\xhh\manifest.json"
          if (Test-Path -LiteralPath $manifestPath) {
            Get-Content -LiteralPath $manifestPath
          }
          else {
            Write-Host "Collector manifest not found at $manifestPath"
          }

      - name: Configure git author
        if: success() && needs.preflight.outputs.mode == 'full'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Import snapshot and push updates
        if: success() && needs.preflight.outputs.mode == 'full'
        shell: powershell
        run: .\scripts\update-card-data.ps1
