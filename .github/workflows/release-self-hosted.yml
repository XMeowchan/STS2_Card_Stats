name: Release Mod

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark the GitHub release as prerelease
        required: false
        default: false
        type: boolean
      remote_data_url:
        description: Override remote stats URL for the shipped config
        required: false
        default: https://xmeowchan.github.io/STS2_Card_Stats/cards.json
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: [self-hosted, windows, x64]
    steps:
      - name: Checkout
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          if (-not $workspace) {
            throw "GITHUB_WORKSPACE is not set."
          }

          if (Test-Path -LiteralPath $workspace) {
            Get-ChildItem -LiteralPath $workspace -Force | Remove-Item -Recurse -Force
          }
          else {
            New-Item -ItemType Directory -Force -Path $workspace | Out-Null
          }

          Set-Location $workspace
          git -c http.proxy= -c https.proxy= init | Out-Null
          git -c http.proxy= -c https.proxy= remote add origin ("https://x-access-token:{0}@github.com/{1}.git" -f $env:GITHUB_TOKEN, "${{ github.repository }}")

          $ref = "${{ github.ref }}"
          $fetched = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              git -c http.proxy= -c https.proxy= fetch --depth 1 origin $ref
              if ($LASTEXITCODE -eq 0) {
                $fetched = $true
                break
              }
            }
            catch {
            }

            Start-Sleep -Seconds (2 * $attempt)
          }

          if (-not $fetched) {
            throw "git fetch failed for $ref"
          }

          git -c http.proxy= -c https.proxy= checkout --force FETCH_HEAD

      - name: Publish release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $buildArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\build-mod-artifacts.ps1"
          )
          & powershell @buildArgs
          if ($LASTEXITCODE -ne 0) {
            throw "build-mod-artifacts failed."
          }

          Start-Sleep -Seconds 5

          $portableArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\build-portable-package.ps1",
            "-SkipBuild"
          )
          & powershell @portableArgs
          if ($LASTEXITCODE -ne 0) {
            throw "build-portable-package failed."
          }

          $installerArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\build-installer.ps1",
            "-SkipBuild"
          )
          & powershell @installerArgs
          if ($LASTEXITCODE -ne 0) {
            throw "build-installer failed."
          }

          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\publish-release.ps1",
            "-Upload",
            "-SkipBuild"
          )

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.prerelease }}" -eq "true") {
              $args += "-Prerelease"
            }
            if ("${{ inputs.remote_data_url }}") {
              $args += @("-RemoteDataUrl", "${{ inputs.remote_data_url }}")
            }
          }

          & powershell @args
