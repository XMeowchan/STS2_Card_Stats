name: Release Mod

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark the GitHub release as prerelease
        required: false
        default: false
        type: boolean
      remote_data_url:
        description: Override remote stats URL for the shipped config
        required: false
        default: https://xmeowchan.github.io/STS2_Card_Stats/cards.json
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: [self-hosted, windows, x64]
    steps:
      - name: Checkout
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          if (-not $workspace) {
            throw "GITHUB_WORKSPACE is not set."
          }

          $runnerTemp = $env:RUNNER_TEMP
          if (-not $runnerTemp) {
            throw "RUNNER_TEMP is not set."
          }

          if (Test-Path -LiteralPath $workspace) {
            Get-ChildItem -LiteralPath $workspace -Force | Remove-Item -Recurse -Force
          }
          else {
            New-Item -ItemType Directory -Force -Path $workspace | Out-Null
          }

          $archivePath = Join-Path $runnerTemp "release-self-hosted-source.zip"
          $extractPath = Join-Path $runnerTemp "release-self-hosted-source"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          if (Test-Path -LiteralPath $extractPath) {
            Remove-Item -LiteralPath $extractPath -Recurse -Force
          }

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "self-hosted-runner"
          }
          $archiveUri = "https://api.github.com/repos/${{ github.repository }}/zipball/${{ github.sha }}"
          Invoke-WebRequest -Uri $archiveUri -Headers $headers -OutFile $archivePath
          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractPath -Force

          $sourceDir = Get-ChildItem -LiteralPath $extractPath -Directory | Select-Object -First 1
          if (-not $sourceDir) {
            throw "Failed to extract source archive."
          }

          Copy-Item (Join-Path $sourceDir.FullName "*") $workspace -Recurse -Force

      - name: Publish release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $buildArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\build-mod-artifacts.ps1"
          )
          & powershell @buildArgs
          if ($LASTEXITCODE -ne 0) {
            throw "build-mod-artifacts failed."
          }

          Start-Sleep -Seconds 5

          $portableArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\build-portable-package.ps1",
            "-SkipBuild"
          )
          & powershell @portableArgs
          if ($LASTEXITCODE -ne 0) {
            throw "build-portable-package failed."
          }

          $installerArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\build-installer.ps1",
            "-SkipBuild"
          )
          & powershell @installerArgs
          if ($LASTEXITCODE -ne 0) {
            throw "build-installer failed."
          }

          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\publish-release.ps1",
            "-Upload",
            "-SkipBuild"
          )

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.prerelease }}" -eq "true") {
              $args += "-Prerelease"
            }
            if ("${{ inputs.remote_data_url }}") {
              $args += @("-RemoteDataUrl", "${{ inputs.remote_data_url }}")
            }
          }

          & powershell @args
